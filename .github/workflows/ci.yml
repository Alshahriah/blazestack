name: CI

on:
  workflow_dispatch: # manually disabled — trigger manually if needed

jobs:
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Biome check
        run: bunx biome ci .

      - name: Typecheck (packages)
        run: |
          bun run --cwd packages/db tsc --noEmit
          bun run --cwd packages/trpc tsc --noEmit
          bun run --cwd packages/auth tsc --noEmit
          bun run --cwd packages/env tsc --noEmit

      - name: Typecheck (api)
        run: bun run --cwd apps/api tsc --noEmit

deploy:
  name: Deploy
  runs-on: ubuntu-latest
  needs: lint-typecheck
  if: github.ref == 'refs/heads/main' && github.event_name == 'push'
  steps:
    - uses: actions/checkout@v4

    - uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Install dependencies
      run: bun install

    - name: Deploy API
      run: bun run --cwd apps/api deploy
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    - name: Build & Deploy Web
      run: bun run --cwd apps/web deploy
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
