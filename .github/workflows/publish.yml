name: Publish create-blaze

on:
  push:
    branches: [main]
    paths:
      - "packages/create-blaze/**"

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --cwd packages/create-blaze

      - name: Check if version changed
        id: version_check
        run: |
          LOCAL=$(node -p "require('./packages/create-blaze/package.json').version")
          PUBLISHED=$(npm show create-blaze version 2>/dev/null || echo "0.0.0")
          echo "local=$LOCAL"
          echo "published=$PUBLISHED"
          if [ "$LOCAL" != "$PUBLISHED" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Build
        if: steps.version_check.outputs.changed == 'true'
        run: bun run --cwd packages/create-blaze build

      - name: Publish
        if: steps.version_check.outputs.changed == 'true'
        run: npm publish --access public
        working-directory: packages/create-blaze
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Skip (version unchanged)
        if: steps.version_check.outputs.changed == 'false'
        run: echo "Version unchanged — skipping publish."
